<div class="col-md-4 col-12 col-sm-4 mt-3" >
    <div class="card rounded-sm m-0 shadow-none border" style="height: 100%;">
      <div class="card-body p-2">
          <div class="row m-0">
              <div class="col text-left" >
                <p class="text-bold h3">Products</p>
              </div>

              <div class="col text-right">
                <p class="h2 text-bold">{{products | length}}</p>
              </div>
          </div>

          <div class="text-right mt-4">
            <button class="btn btn-success pl-4 pr-4 btn-sm">See all</button>
          </div>
      </div>
    </div>
  </div>
  <div class="col-md-4 col-12 col-sm-4 mt-3" >
    <div class="card rounded-sm m-0 shadow-none border" style="height: 100%;">
        <div class="card-body p-2">
            <div class="row m-0">
                <div class="col text-left">
                  <p class="text-bold h3">Orders</p>
                </div>
  
                <div class="col text-right">
                  <p class="h2 text-bold">{{orders | length}}</p>
                </div>
            </div>
            <div class="row m-0 mt-2 border-bottom">
                <div class="col text-left">
                  <p class="text-bold"> <i class="fa fa-circle text-blue mr-2" style="font-size: x-small"></i> New</p>
                </div> 
  
                <div class="col text-right">
                  <p class="h4 text-bold">{{neworders | length}}
                      <a class="uk-icon-button bg-translucent-info rounded-circle shadow-none spa" href="{% url 'admin_orders' filter='new' %}" 
                      style="width: 20px !important;height: 20px !important;">
                      <i class="material-icons text-white " >chevron_right</i></a>
                  </p>
                </div>
            </div>
            <div class="row m-0 mt-2 border-bottom">
                <div class="col text-left">
                  <p class="text-bold"> <i class="fa fa-circle text-green mr-2" style="font-size: x-small"></i> Paid</p>
                </div> 
  
                <div class="col text-right">
                  <p class="h4 text-bold">{{paidorders | length}}
                      <a class="uk-icon-button bg-translucent-info rounded-circle shadow-none spa" href="{% url 'admin_orders' filter='paid' %}" 
                      style="width: 20px !important;height: 20px !important;">
                      <i class="material-icons text-white " >chevron_right</i></a>
                  </p>
                </div>
            </div>

            <div class="row m-0 mt-2">
                <div class="col text-left">
                  <p class="text-bold"> <i class="fa fa-circle text-warning mr-2" style="font-size: x-small"></i> Unpaid</p>
                </div> 
  
                <div class="col text-right">
                  <p class="h4 text-bold">{{unpaidorders | length}}
                      <a class="uk-icon-button bg-translucent-info rounded-circle shadow-none spa" href="{% url 'admin_orders' filter='unpaid' %}" 
                      style="width: 20px !important;height: 20px !important;">
                      <i class="material-icons text-white " >chevron_right</i></a>
                  </p>
                </div>
            </div>
  
            <div class="text-right mt-4">
              <a class="btn btn-success pl-4 pr-4 btn-sm spa" href="{% url 'admin_orders' filter='all' %}">See all</a>
            </div>
        </div>
      </div>
  </div>
  <div class="col-md-4 col-12 col-sm-4 mt-3">
    <div class="card rounded-sm m-0 shadow-none border" style="height: 100%;">
        <div class="card-body p-2">
            <div class="row m-0">
                <div class="col text-left">
                  <p class="text-bold h3">Products</p>
                </div>
  
                <div class="col text-right">
                  <p class="h2 text-bold">{{products | length}}</p>
                </div>
            </div>
  
            <div class="text-right mt-4">
              <button class="btn btn-success pl-4 pr-4 btn-sm">See all</button>
            </div>
        </div>
      </div>
  </div>
