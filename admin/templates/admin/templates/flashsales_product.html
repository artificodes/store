<div class="card p-0 m-0 mt-1 uk-text-left rounded-md" for="{{product.product.productid}}">

    <div class="card-body p-2">
        {% if product.discount %}
        <div class="uk-position-top-right mt-2 mr-2 bg-primary rounded-sm p-1" style="z-index: 3;">
           <span class="text-white text-sm"> -{{product.discount}}% </span>
         </div>
         {% endif %}

        <div class="row m-0">
            <!-- <div class="col-12 text-left">
                      <p class="text-bold h3">Product name</p>
                    </div> -->

            <div class="col-12 text-center">
                <p class="h3 text-bold"></p>
            </div>
        </div>
        <div class="row m-0">


            <div class="col-12 text-center">
                <img src="{{product.product.url}}" alt="" style="max-height: 100px;">
            </div>
        </div>
        <div class=" rounded-md p-0 mt-2 m-0 text-sm text-center">
            <div class="pl-1 pr-1 pt-0 pb-0">
              <h3 class="text-sm text-dark uk-text-normal">{{product.product.name | truncatechars:40}} </h3>
            </div>

            <div class=" pl-1 pr-1 pt-0 pb-0">
              <p class="text-bold text-sm text-darker">{{product.formatted_price}}</p>

            </div>
         
            
       
            <!-- <div class="">
              <div class="ui rating mini uk-display-inline-block" data-rating="{{product.rating}}" data-max-rating="5"></div>
              <div class="text-darker uk-display-inline-block">(5)</div>
  
            </div> -->

          </div>
        <div class="text-center mt-3">
            <button class="uk-width-1-1 rounded-md btn btn-secondary m-0 shadow-none">Remove</button>
        </div>
    </div>
</div>
