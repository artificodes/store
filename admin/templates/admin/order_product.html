<div class="col-csxx-xx-14 col-csxx-x-14 col-csxx-14 col-csx-14 col-css-7 col-csm-7 col-cmd-7 col-lg-4  mt-3 p-2">

<div class="card m-0 mb-1" id="{{product.cartedproductid}}" style="">
    
    <div class="card-body">
        
        <div class="row m-0">
            <div class="col-csxx-x-4 p-0 text-left"
                style="">
                <img src="{{site}}{{product.product.image.url}}" alt="" class="rounded-md shadow-none"
                    style="max-width:100%;; height: 100%;">
                
            </div>
            <div class="col-csxx-x-10 p-0 text-left">
                <div class="row m-0 pl-2 pt-0">
                    <div class="col-12 text-right p-0 h4 m-0">
                        {{product.product.name}}
                    </div>
                    <div class="col-12 text-left p-0 h3" id="price{{product.product.productid}}">
                        <div class="col-csxx-x-14 text-right">
                            {{product.formatted_amount}}
                        </div>
                        <div class="col-csxx-x-14 text-right">
                            {{product.formatted_quantity}}
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>



    </div>
</div>
</div>

<script>
    {
        (function ($) {
            $('.confirm').on('click', function () {

                var link = $(this);
                $('#confirm-modal-inner').empty()
                $('#confirm-modal-inner').append(link.attr('message'))
                $('#yes').attr('contenturl', link.attr('contenturl'))
                $('#yes').attr('target', link.attr('target'))
                UIkit.modal($('#confirm-modal')).show();
            }
            );
        }(jQuery))
    };
</script>
